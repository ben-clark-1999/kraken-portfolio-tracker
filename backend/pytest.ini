[pytest]
markers =
    eval: agent eval suite — opt-in via `pytest -m eval`. Hits live LLM APIs.
    db: integration test that hits the live Supabase `test` schema. Skipped in CI (no DB creds) via `pytest -m "not db"`.
asyncio_mode = auto
testpaths = tests
# Exclude `eval`-marked tests from default runs — they hit live LLM APIs and
# cost real money per invocation. Run explicitly with `pytest -m eval`.
addopts = -m "not eval"
